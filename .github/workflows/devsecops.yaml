name: DevSecOps Blue-Green CI/CD

on:
  push:
    branches: [ main ]

jobs:
  security-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t devsecops-node-app:${{ github.sha }} .

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'devsecops-node-app:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '1' # This stops the pipeline if vulnerabilities are found

      - name: Set up kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }} # You would add this to GitHub Secrets

      - name: Deploy to Green Environment
        run: |
          cd k8s/overlays/green
          kustomize edit set image devsecops-node-app=devsecops-node-app:${{ github.sha }}
          kubectl apply -k .

      - name: Smoke Test & Traffic Flip
        run: |
          # Wait for Green pods
          kubectl rollout status deployment/green-node-app --timeout=60s
          # Patch Service to Green
          kubectl patch svc final-production-service -p '{"spec":{"selector":{"variant":"green"}}}'
