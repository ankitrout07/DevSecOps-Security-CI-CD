apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-app
      variant: blue
  template:
    metadata:
      labels:
        app: node-app
        variant: blue
    spec:
      containers:
      - name: node-app
        image: devsecops-node-app:v1
        ports:
        - containerPort: 8080
        env:
        - name: APP_ENV
          value: "BLUE"
