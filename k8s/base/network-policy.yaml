apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: node-app-network-policy
spec:
  podSelector:
    matchLabels:
      app: node-app
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          role: frontend # Allow from frontend if exists
    ports:
    - protocol: TCP
      port: 8080
