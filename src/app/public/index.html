<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevSecOps | Deployment Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body id="app-body">
    <div class="dashboard">
        <div class="card">
            <div class="glow"></div>
            <div class="badge-container">
                <span class="status-badge" id="env-badge">Loading...</span>
            </div>
            <h1>System Status</h1>

            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">Deployment</span>
                    <span class="stat-value" id="deployment-status">Healthy</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Version</span>
                    <span class="stat-value" id="app-version">v1.1.0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Security</span>
                    <span class="stat-value">Trivy Passed</span>
                </div>
            </div>

            <div class="footer">
                DevSecOps Blue-Green Control Center
            </div>
        </div>
    </div>

    <script>
        window.__CONFIG__ = {
            env: '{{APP_ENV}}',
            version: '{{APP_VERSION}}'
        };
    </script>
    <script src="/js/app.js"></script>
</body>

</html>
